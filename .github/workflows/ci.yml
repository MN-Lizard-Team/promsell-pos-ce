name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Analyze
        id: analyze
        run: flutter analyze 2>&1 | tee analyze_output.txt; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Upload analyze output on failure
        if: steps.analyze.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: analyze-output
          path: analyze_output.txt

      - name: Fail if analyze failed
        if: steps.analyze.outcome == 'failure'
        run: exit 1

      - name: Run tests with coverage
        run: flutter test --coverage --exclude-tags stress

      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          min_coverage: 30
          path: coverage/lcov.info
          exclude: 'lib/l10n/app_localizations.dart lib/l10n/app_localizations_en.dart lib/l10n/app_localizations_th.dart lib/**/*.g.dart lib/**/*.gr.dart lib/**/*.freezed.dart lib/core/di/injection.config.dart'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Dependency audit
        run: |
          dart pub outdated --json > pub-outdated.json
          dart run tool/check_outdated.dart
          dart pub outdated --no-dev-dependencies

      - name: Verify debug build
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart
