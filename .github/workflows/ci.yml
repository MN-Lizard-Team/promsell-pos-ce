name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Generate Drift code
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          min_coverage: 30
          path: coverage/lcov.info
          exclude: 'lib/l10n/app_localizations.dart lib/l10n/app_localizations_en.dart lib/l10n/app_localizations_th.dart lib/**/*.g.dart lib/**/*.gr.dart lib/**/*.freezed.dart lib/core/di/injection.config.dart'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Dependency audit
        run: dart pub outdated --no-dev-dependencies

      - name: Verify debug build
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart
