name: promsell_pos_ce
description: "PromSell POS Community Edition — Offline-first mobile POS for small businesses"
publish_to: 'none'
version: 0.2.1+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Database (Drift)
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # Navigation
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # QR Code
  qr_flutter: ^4.1.0

  # PDF Receipt
  pdf: ^3.11.3
  printing: ^5.14.1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  sqlite3_flutter_libs: ^0.5.28

  # Drift codegen
  drift_dev: ^2.26.1
  build_runner: ^2.4.15

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#1B6B2A"
  adaptive_icon_foreground: "assets/icons/app_icon.jpeg"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
