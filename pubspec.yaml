name: promsell_pos_ce
description: "PromSell POS Community Edition — Offline-first mobile POS for small businesses"
publish_to: 'none'
version: 0.8.2+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Database (Drift)
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  path: ^1.9.0
  path_provider: ^2.1.5

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.6.0

  # PDF Receipt
  pdf: ^3.11.3
  printing: ^5.14.1

  # Utilities
  intl: ^0.20.2
  meta: ^1.16.0
  uuid: ^4.5.1
  image_picker: ^1.2.2
  image: ^4.9.1
  cached_network_image: ^3.3.0
  image_cropper: ^8.0.0

  # Merchant Tools
  share_plus: ^10.0.2
  package_info_plus: ^8.3.0
  file_picker: ^8.1.2
  csv: ^6.0.0
  qr_flutter: ^4.1.0
  thai_promptpay: ^0.3.0
  mobile_scanner: ^6.0.0
  audioplayers: ^6.2.0
  permission_handler: ^11.3.0

  # Backup Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  sqlite3_flutter_libs: ^0.5.28

  # Drift codegen
  drift_dev: ^2.26.1
  build_runner: ^2.4.15

  # DI codegen
  injectable_generator: ^2.6.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#1B6B2A"
  adaptive_icon_foreground: "assets/icons/app_icon.jpeg"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/demo/
    - LICENSE
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: NotoSansThai
      fonts:
        - asset: assets/fonts/NotoSansThai-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansThai-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansThai-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansThai-Bold.ttf
          weight: 700
